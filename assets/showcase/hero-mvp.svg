<svg xmlns="http://www.w3.org/2000/svg" width="920" height="380" viewBox="0 0 920 380" role="img" aria-labelledby="title desc">
  <title id="title">Project A  MVP showcase banner</title>
  <desc id="desc">Placeholder banner until gameplay screenshots or GIF are added to this folder.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
  </defs>
  <rect width="920" height="380" fill="url(#bg)"/>
  <rect x="48" y="48" width="824" height="6" fill="url(#accent)" rx="3"/>
  <text x="48" y="120" fill="#f0f6fc" font-family="Segoe UI, system-ui, sans-serif" font-size="36" font-weight="700">Project A</text>
  <text x="48" y="168" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="18">2D roguelite / survivor-like · Godot 4.6.1</text>
  <text x="48" y="220" fill="#3fb950" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600">MVP shipped · Git tag mvp-0.1</text>
  <text x="48" y="300" fill="#6e7681" font-family="Segoe UI, system-ui, sans-serif" font-size="13">Replace with gameplay GIF or screenshots (see assets/showcase/README.md)</text>
</svg>
